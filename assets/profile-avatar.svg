<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- Circular Clip Path -->
    <clipPath id="circle-clip">
      <circle cx="100" cy="100" r="90" />
    </clipPath>
    
    <!-- Gradient for glowing border -->
    <linearGradient id="avatar-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="avatar-glow">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="0.6" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Glowing Outer Border -->
  <circle cx="100" cy="100" r="93" fill="none" stroke="url(#avatar-grad)" stroke-width="3.5" filter="url(#avatar-glow)" />

  <!-- Background Circle (incase image has transparency) -->
  <circle cx="100" cy="100" r="90" fill="#070a13" />

  <!-- Avatar Image cropped to circle -->
  <!-- Note: Make sure to name your uploaded photo 'profile.jpg' and place it inside the 'assets' directory -->
  <image href="profile.jpg" x="10" y="10" width="180" height="180" clip-path="url(#circle-clip)" />
</svg>
