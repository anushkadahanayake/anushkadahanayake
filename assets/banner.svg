<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 430" width="100%" height="100%">
  <defs>
    <!-- Google Fonts -->
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&amp;family=Space+Grotesk:wght@400;500;700&amp;display=swap');
      
      .font-outfit {
        font-family: 'Outfit', sans-serif;
      }
      
      .font-space {
        font-family: 'Space Grotesk', sans-serif;
      }
      
      /* Pulse animation for green status dot */
      @keyframes pulse-green {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
      
      .status-dot {
        animation: pulse-green 2s infinite;
      }

      /* Float animations for badges */
      @keyframes float-y-slow {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
      }
      
      @keyframes float-y-fast {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-5px); }
      }

      .float-badge-1 {
        animation: float-y-slow 5s ease-in-out infinite;
      }

      .float-badge-2 {
        animation: float-y-slow 6s ease-in-out infinite 1.5s;
      }

      .float-badge-3 {
        animation: float-y-fast 4s ease-in-out infinite 0.5s;
      }

    </style>

    <!-- Gradients -->
    <linearGradient id="hero-text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c084fc">
        <animate attributeName="stop-color" values="#c084fc; #f472b6; #fb7185; #c084fc" dur="10s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#fb7185">
        <animate attributeName="stop-color" values="#fb7185; #c084fc; #f472b6; #fb7185" dur="10s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <linearGradient id="badge-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.05" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="45" height="45" patternUnits="userSpaceOnUse" x="0" y="0">
      <animate attributeName="y" values="0;45" dur="12s" repeatCount="indefinite" />
      <path d="M 45 0 L 0 0 0 45" fill="none" stroke="#1e293b" stroke-width="0.8" stroke-opacity="0.3"/>
    </pattern>

    <!-- Blur filter -->
    <filter id="blur">
      <feGaussianBlur stdDeviation="80" />
    </filter>

    <!-- Avatar bottom fade out mask -->
    <mask id="avatar-mask">
      <rect x="540" y="30" width="300" height="350" fill="url(#mask-grad)" />
    </mask>
    <linearGradient id="mask-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="85%" stop-color="#ffffff" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Background base -->
  <rect width="100%" height="100%" fill="#060814" />

  <!-- Ambient blur lights (Teal & Purple) -->
  <circle cx="100" cy="100" r="160" fill="#a855f7" opacity="0.1" filter="url(#blur)"/>
  <circle cx="750" cy="200" r="180" fill="#06b6d4" opacity="0.08" filter="url(#blur)"/>

  <!-- Moving Grid -->
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Left Content: Portfolio Text -->
  <g transform="translate(50, 0)">
    <!-- Top badge: Available status -->
    <g transform="translate(0, 30)">
      <rect width="250" height="26" rx="13" fill="#1e1e38" fill-opacity="0.4" stroke="#a855f7" stroke-width="0.8" stroke-opacity="0.3" />
      <circle cx="15" cy="13" r="4.5" fill="#10b981" class="status-dot" />
      <text x="27" y="17" class="font-space" font-weight="700" font-size="9" fill="#94a3b8" letter-spacing="1.5">FOUNDER PORTFOLIO</text>
      <text x="145" y="17" class="font-space" font-weight="700" font-size="9" fill="#38bdf8" letter-spacing="1.5">· AVAILABLE</text>
    </g>

    <!-- User Name Subtitle -->
    <text x="0" y="85" class="font-space" font-weight="700" font-size="11" fill="#c084fc" letter-spacing="3.5">ANUSHKA DAHANAYAKE</text>

    <!-- Main Tagline -->
    <text x="0" y="132" class="font-outfit" font-weight="900" font-size="34" fill="#ffffff">Building <tspan fill="url(#hero-text-grad)">digital products</tspan></text>
    <text x="0" y="175" class="font-outfit" font-weight="900" font-size="34" fill="#ffffff">that scale businesses</text>

    <!-- Subtext -->
    <text x="0" y="210" class="font-space" font-weight="400" font-size="12" fill="#94a3b8">BSc (Hons) Computing student at <tspan fill="#ffffff" font-weight="700">Coventry University (UK)</tspan>, software</text>
    <text x="0" y="228" class="font-space" font-weight="400" font-size="12" fill="#94a3b8">engineer, and e-commerce specialist with <tspan fill="#ffffff" font-weight="700">11+ years</tspan> delivering WordPress,</text>
    <text x="0" y="246" class="font-space" font-weight="400" font-size="12" fill="#94a3b8">WooCommerce, Shopify, and full-stack systems for global clients.</text>

    <!-- Horizontal Badges Row -->
    <g transform="translate(0, 275)" class="font-space" font-weight="500" font-size="10">
      <!-- Colombo Badge -->
      <g>
        <rect width="112" height="24" rx="12" fill="#1e1b4b" fill-opacity="0.3" stroke="#312e81" stroke-width="1" />
        <text x="12" y="16" fill="#e2e8f0">📍 Colombo, SL</text>
      </g>
      <!-- Coventry Badge -->
      <g transform="translate(120, 0)">
        <rect width="115" height="24" rx="12" fill="#1e1b4b" fill-opacity="0.3" stroke="#312e81" stroke-width="1" />
        <text x="12" y="16" fill="#e2e8f0">🎓 NIBM / Coventry</text>
      </g>
      <!-- Engineer Badge -->
      <g transform="translate(243, 0)">
        <rect width="168" height="24" rx="12" fill="#1e1b4b" fill-opacity="0.3" stroke="#312e81" stroke-width="1" />
        <text x="12" y="16" fill="#e2e8f0">💼 Associate Software Eng.</text>
      </g>
    </g>

    <!-- Grid statistics block at bottom -->
    <g transform="translate(0, 325)">
      <!-- Box 1 -->
      <g>
        <rect width="90" height="55" rx="10" fill="#0f172a" fill-opacity="0.4" stroke="#1e293b" stroke-width="1" />
        <text x="12" y="20" class="font-space" font-weight="700" font-size="8" fill="#64748b" letter-spacing="1">EXPERIENCE</text>
        <text x="12" y="42" class="font-outfit" font-weight="800" font-size="16" fill="#ffffff">11+ Yrs</text>
      </g>
      <!-- Box 2 -->
      <g transform="translate(100, 0)">
        <rect width="110" height="55" rx="10" fill="#0f172a" fill-opacity="0.4" stroke="#1e293b" stroke-width="1" />
        <text x="12" y="20" class="font-space" font-weight="700" font-size="8" fill="#64748b" letter-spacing="1">TRANSACTIONS</text>
        <text x="12" y="42" class="font-outfit" font-weight="800" font-size="16" fill="#ffffff">1,000+ US</text>
      </g>
      <!-- Box 3 -->
      <g transform="translate(220, 0)">
        <rect width="90" height="55" rx="10" fill="#0f172a" fill-opacity="0.4" stroke="#1e293b" stroke-width="1" />
        <text x="12" y="20" class="font-space" font-weight="700" font-size="8" fill="#64748b" letter-spacing="1">UNIVERSITY</text>
        <text x="12" y="42" class="font-outfit" font-weight="800" font-size="16" fill="#ffffff">BSc (Hons)</text>
      </g>
      <!-- Box 4 -->
      <g transform="translate(320, 0)">
        <rect width="90" height="55" rx="10" fill="#0f172a" fill-opacity="0.4" stroke="#1e293b" stroke-width="1" />
        <text x="12" y="20" class="font-space" font-weight="700" font-size="8" fill="#64748b" letter-spacing="1">INCORPORATED</text>
        <text x="12" y="42" class="font-outfit" font-weight="800" font-size="16" fill="#ffffff">2024</text>
      </g>
    </g>
  </g>

  <!-- Right Content: Profile Image and Floating Badges -->
  <!-- Container with subtle transform/origin for floats -->
  <g transform="translate(560, 0)">
    <!-- Base background border glow for the image -->
    <rect x="-10" y="30" width="310" height="340" fill="url(#badge-glow)" rx="16" opacity="0.3" filter="url(#blur)" />

    <!-- Headshot image with fade mask at bottom -->
    <image href="profile.jpg" x="0" y="30" width="290" height="340" rx="16" mask="url(#avatar-mask)" />

    <!-- FLOATING BADGE 1: Experience (Left of photo) -->
    <g transform="translate(-80, 85)">
      <g class="float-badge-1">
        <rect width="105" height="42" rx="12" fill="#090d1a" fill-opacity="0.9" stroke="#1e293b" stroke-width="1.5" />
        <text x="12" y="16" class="font-space" font-weight="700" font-size="8" fill="#a855f7" letter-spacing="1">EXPERIENCE</text>
        <text x="12" y="32" class="font-outfit" font-weight="800" font-size="13" fill="#ffffff">11+ Years</text>
      </g>
    </g>

    <!-- FLOATING BADGE 2: Focus (Right of photo) -->
    <g transform="translate(205, 230)">
      <g class="float-badge-2">
        <rect width="125" height="42" rx="12" fill="#090d1a" fill-opacity="0.9" stroke="#1e293b" stroke-width="1.5" />
        <text x="12" y="16" class="font-space" font-weight="700" font-size="8" fill="#ec4899" letter-spacing="1">FOCUS</text>
        <text x="12" y="32" class="font-outfit" font-weight="800" font-size="11" fill="#ffffff">E-Commerce · SEO</text>
      </g>
    </g>

    <!-- FLOATING BADGE 3: Founder (Bottom Overlay) -->
    <g transform="translate(45, 335)">
      <g class="float-badge-3">
        <rect width="200" height="28" rx="14" fill="#090d1a" fill-opacity="0.95" stroke="#a855f7" stroke-width="1" stroke-opacity="0.5" />
        <text x="100" y="18" class="font-space" font-weight="700" font-size="10" fill="#e2e8f0" text-anchor="middle" letter-spacing="1">Anushka Dahanayake · Founder</text>
      </g>
    </g>
  </g>
</svg>
